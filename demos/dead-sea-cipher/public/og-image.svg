<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0a0f"/>
      <stop offset="1" stop-color="#15131f"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.3" r="0.6">
      <stop offset="0" stop-color="#c4956a" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#c4956a" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <rect x="8" y="8" width="1184" height="614" rx="20" fill="none" stroke="#2a2a3d" stroke-width="2"/>

  <!-- Cipher disk emblem -->
  <g transform="translate(965,235)" fill="none" stroke="#c4956a">
    <circle r="150" stroke-width="6" opacity="0.92"/>
    <circle r="82" stroke-width="6" opacity="0.92"/>
    <g stroke-width="5" stroke-linecap="round">
      <line x1="0" y1="-185" x2="0" y2="-160"/>
      <line x1="0" y1="160" x2="0" y2="185"/>
      <line x1="-185" y1="0" x2="-160" y2="0"/>
      <line x1="160" y1="0" x2="185" y2="0"/>
      <line x1="-131" y1="-131" x2="-113" y2="-113"/>
      <line x1="113" y1="113" x2="131" y2="131"/>
      <line x1="131" y1="-131" x2="113" y2="-113"/>
      <line x1="-113" y1="113" x2="-131" y2="131"/>
    </g>
    <circle r="14" fill="#c4956a" stroke="none"/>
  </g>

  <!-- Title block -->
  <text x="90" y="250" fill="#e0e0ea" font-size="92" letter-spacing="2">Dead Sea Cipher</text>
  <text x="92" y="312" fill="#9090a8" font-size="34" font-style="italic" font-family="Georgia, serif">The arc of cryptographic history</text>

  <!-- Arc subtitle -->
  <text x="92" y="392" fill="#c4956a" font-size="30" letter-spacing="3" font-family="'Inter', system-ui, sans-serif">ATBASH · ~600 BCE  →  AES-256-GCM · 2001 CE</text>

  <!-- Timeline ticks -->
  <g font-family="'Inter', system-ui, sans-serif">
    <line x1="92" y1="470" x2="760" y2="470" stroke="#2a2a3d" stroke-width="3"/>
    <g fill="#c4956a">
      <circle cx="92"  cy="470" r="9"/>
      <circle cx="259" cy="470" r="9"/>
      <circle cx="426" cy="470" r="9"/>
      <circle cx="593" cy="470" r="9"/>
      <circle cx="760" cy="470" r="9"/>
    </g>
    <g fill="#9090a8" font-size="22" text-anchor="middle">
      <text x="92"  y="512">Atbash</text>
      <text x="259" y="512">Caesar</text>
      <text x="426" y="512">Vigenère</text>
      <text x="593" y="512">OTP</text>
      <text x="760" y="512">AES</text>
    </g>
  </g>

  <text x="92" y="575" fill="#606078" font-size="22" font-family="'Inter', system-ui, sans-serif">Every cipher, a live encoder + the attack that broke it.</text>
</svg>
